}
 
function getBadge(threshold) {
  if (threshold.includes('damaged')) return ['badge-damaged', '🔧'];
  if (threshold.includes('%')) return ['badge-percent', '📊'];
  if (threshold.includes('training')) return ['badge-training', '🎓'];
  if (threshold.includes('trainer')) return ['badge-trainer', '👩‍🏫'];
  if (threshold.includes('stock')) return ['badge-outofstock', '🔄'];
  return ['badge-count', '📦'];
}
 
function renderItems(items) {
  const tbody = document.getElementById('items-body');
  const cityKey = state.city;
  if (items.length === 0) {
    tbody.innerHTML = '<tr><td colspan="2"><div class="empty-state">No items match your search.</div></td></tr>';
    return;
  }
  tbody.innerHTML = items.map(item => {
    const threshold = item[cityKey];
    const [cls, icon] = getBadge(threshold);
    const note = item.note ? `<div class="item-note">${item.note}</div>` : '';
    return `<tr><td>${item.name}${note}</td><td><span class="badge ${cls}">${icon} ${threshold}</span></td></tr>`;
  }).join('');
}
 
function filterItems(q) {
  const filtered = allItems.filter(i => i.name.toLowerCase().includes(q.toLowerCase()));
  renderItems(filtered);
}
 
function toggleAI() {
  const panel = document.getElementById('aiPanel');
  const btn = document.getElementById('aiToggleBtn');
  const visible = panel.classList.toggle('visible');
  btn.classList.toggle('active', visible);
  btn.innerHTML = visible
    ? '<div class="ai-dot"></div> Close Assistant'
    : '<div class="ai-dot"></div> Ask AI Assistant';
}
 
// --- AI SYSTEM ---
 
const SYSTEM_PROMPT = `You are a helpful stock management assistant for beauty professionals at UC (Urban Company) in Saudi Arabia. You have full knowledge of the UC Shop Order Process.`;

// Local lightweight logic to answer immediately if the Cloud API fails or is not connected
function localStockResponder(query) {
  const q = query.toLowerCase();
  
  if (q.includes('candle')) {
    return "Candles should be reordered when you have 20 pieces left in Riyadh, and 40 pieces left in other cities.";
  }
  if (q.includes('riyadh vs') || q.includes('other cities') || q.includes('different')) {
    return "Most consumables in Riyadh are ordered at 25% remaining, whereas other cities order at 50% due to delivery times. For count items, other cities usually require twice the threshold (e.g. 40 sheets vs 20 sheets).";
  }
  if (q.includes('fixed')) {
    return "All fixed items (like beds, bags, machines, diffusers, and tools) should be reordered immediately 'When damaged'. Ensure you replace them right away!";
  }
  if (q.includes('consequence') || q.includes('late') || q.includes('run out')) {
    return "Running out of stock is your responsibility. Late orders will result in a formal warning letter with salary deductions, as well as deductions matching the missing item's price.";
  }
  if (q.includes('sanitizer')) {
    return "Sanitizers should be reordered when there is 25% remaining in Riyadh, or 50% remaining in other cities.";
  }
  if (q.includes('oil')) {
    return "Spa Soma Oils (TL, FL, E&S, CC) require reordering at 2 bottles left in Riyadh, and 5 bottles left in other cities. Upskilling Jojoba oil requires 4 bottles in Riyadh and 8 bottles in other cities.";
  }
  
  // Generic responsive answer based on stock rules
  return "Remember to check your stock on your designated shelf daily after every booking. Make sure to place orders while you still have sufficient stock so you never run out of supplies!";
}

// Speak response aloud using native Web Speech API
function playVoiceover(text) {
  if (isMuted || !('speechSynthesis' in window)) return;
  
  // Cancel any speech currently playing
  window.speechSynthesis.cancel();
  
  // Create Speech Utterance
  const utterance = new SpeechSynthesisUtterance(text);
  
  // Attempt to select a natural English voice if available
  const voices = window.speechSynthesis.getVoices();
  const femaleVoice = voices.find(voice => voice.name.includes('Google US English') || voice.name.includes('Natural') || voice.lang.startsWith('en'));
  if (femaleVoice) {
    utterance.voice = femaleVoice;
  }
  
  utterance.rate = 1.0;  // Standard speed
  utterance.pitch = 1.0; // Standard pitch
  
  window.speechSynthesis.speak(utterance);
}

// Attempt API first, fallback to offline rules automatically
async function callClaude(userMessage) {
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: userMessage }]
      })
    });
    
    if (!response.ok) throw new Error("API Connection Failed");
    const data = await response.json();
    return data.content?.[0]?.text || localStockResponder(userMessage);
  } catch (e) {
    console.log("Using Local Assistant Engine (API Key not configured or blocked by browser)...");
    // Fallback directly to the smart local engine
    return localStockResponder(userMessage);
  }
}

  const messages = document.getElementById('aiMessages');
  const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div><div class="msg-time">${now}</div>`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}
 
function showTyping(visible) {
  const t = document.getElementById('typingIndicator');
  t.classList.toggle('visible', visible);
  const messages = document.getElementById('aiMessages');
  messages.scrollTop = messages.scrollHeight;
}
 
async function sendMessage() {
  const input = document.getElementById('aiInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
 
  if (!document.getElementById('aiPanel').classList.contains('visible')) toggleAI();
 
  addMessage(text, 'user');
  showTyping(true);
 
  try {
    const reply = await callClaude(text);
    showTyping(false);
    addMessage(reply, 'ai');
    playVoiceover(reply); // Trigger audio voiceover narration
  } catch (e) {
    showTyping(false);
    const fallbackMessage = localStockResponder(text);
    addMessage(fallbackMessage, 'ai');
    playVoiceover(fallbackMessage); // Trigger audio voiceover narration
  }
}
 
function sendChip(text) {
  document.getElementById('aiInput').value = text;
  sendMessage();
}

// Pre-fetch voices for Speech Synthesis (helps prevent lag on Chrome/Safari)
if ('speechSynthesis' in window) {
  window.speechSynthesis.getVoices();
}
</script>
